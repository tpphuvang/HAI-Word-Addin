<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAI Assistant</title>
    <!-- Thư viện lõi của Microsoft -->
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <style>
        /* Đồng bộ tuyệt đối với giao diện Microsoft Word */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            padding: 15px; 
            background-color: #ffffff; 
            color: #333333; 
            margin: 0; 
        }
        h2 { 
            font-size: 16px; 
            color: #2b579a; /* Màu xanh đặc trưng của Word */
            margin-bottom: 20px; 
            font-weight: 600; 
            border-bottom: 1px solid #eaeaea;
            padding-bottom: 10px;
        }
        .form-group { margin-bottom: 15px; }
        label { 
            display: block; 
            font-size: 13px; 
            margin-bottom: 5px; 
            font-weight: 500; 
        }
        select, textarea, input { 
            width: 100%; 
            padding: 8px; 
            border: 1px solid #c8c8c8; 
            border-radius: 4px; 
            box-sizing: border-box; 
            font-family: inherit; 
            font-size: 13px; 
        }
        textarea { resize: vertical; min-height: 120px; }
        select:focus, textarea:focus, input:focus { 
            border-color: #2b579a; 
            outline: none; 
        }
        button { 
            background-color: #2b579a; 
            color: white; 
            border: none; 
            padding: 10px 15px; 
            width: 100%; 
            border-radius: 4px; 
            font-size: 14px; 
            cursor: pointer; 
            transition: 0.2s; 
            font-weight: 500; 
        }
        button:hover { background-color: #1a365d; }
        button:disabled { background-color: #cccccc; cursor: not-allowed; }
        
        #status { margin-top: 10px; font-size: 12px; text-align: center; font-weight: 500; }
        
        /* Hiệu ứng xoay khi tải */
        .loader { 
            display: none; 
            border: 3px solid #f3f3f3; 
            border-top: 3px solid #2b579a; 
            border-radius: 50%; 
            width: 20px; 
            height: 20px; 
            animation: spin 1s linear infinite; 
            margin: 15px auto; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Vùng nhập Key thu gọn phía dưới cùng */
        .settings-zone {
            margin-top: 30px;
            padding-top: 15px;
            border-top: 1px dashed #eaeaea;
        }
    </style>
</head>
<body>
    <h2>Trợ lý AI - Phú Vinh</h2>
    
    <div class="form-group">
    <label for="aiProvider">0. Chọn "Bộ não" AI:</label>
    <select id="aiProvider">
        <option value="gemini">Google Gemini (Mặc định)</option>
        <option value="claude">Anthropic Claude</option>
        <option value="perplexity">Perplexity (Tra cứu)</option>
        <option value="local">AI Offline (Máy nội bộ)</option>
    </select>
</div>

    <div class="form-group">
        <label for="promptInput">2. Nội dung cần tham mưu:</label>
        <textarea id="promptInput" placeholder="Ví dụ: Đề nghị bổ sung kinh phí mua sắm 02 máy tính cho Bộ phận Một cửa vì máy cũ đã hỏng..."></textarea>
    </div>

    <button id="btnGenerate">Soạn thảo ngay</button>
    <div class="form-group" style="display: flex; gap: 10px; margin-top: 10px; border-top: 1px solid #eee; padding-top: 10px;">
        <label style="display: inline-flex; align-items: center; gap: 5px; font-size: 12px;">
            <input type="radio" name="mode" value="editor" checked> Editor
        </label>
        <label style="display: inline-flex; align-items: center; gap: 5px; font-size: 12px;">
            <input type="radio" name="mode" value="chat"> Chat only
        </label>
    </div>

    <!-- Vùng hiển thị Chat -->
    <div id="chatResult" style="display: none; margin-top: 15px; padding: 10px; background: #f9f9f9; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; white-space: pre-wrap; max-height: 200px; overflow-y: auto;">
    </div>
    <button id="btnInsertManual" style="display: none; margin-top: 5px; background-color: #ffffff; color: #2b579a; border: 1px solid #2b579a; font-size: 12px;">Chèn vào Word</button>
    <div class="loader" id="loadingSpinner"></div>
    <div id="status"></div>

    <div class="settings-zone">
        <label for="apiKey" style="color: #666; font-size: 11px;">Khóa kết nối Gemini API (Chỉ lưu trên máy):</label>
        <input type="password" id="apiKey" placeholder="Nhập API Key vào đây..." style="font-size: 11px; padding: 5px;">
    </div>

    <script src="taskpane.js"></script>
</body>
</html>
